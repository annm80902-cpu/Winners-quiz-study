<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winners Group Platform</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --border: rgba(255, 255, 255, 0.2);
            --text: #ffffff;
            --accent: #00f2fe;
            --success: #8bc34a;
            --danger: #ff4d4d;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            color: var(--text);
        }

        .container {
            width: 95%;
            max-width: 500px;
            height: 90vh;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .tabs { display: flex; background: rgba(0,0,0,0.3); padding: 5px; }

        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 1rem;
            border-radius: 15px;
            transition: 0.3s;
        }

        .tab-btn.active {
            color: white;
            background: rgba(255,255,255,0.1);
            box-shadow: inset 0 0 10px var(--accent);
        }

        .content-section { display: none; padding: 20px; overflow-y: auto; height: 100%; }
        .content-section.active { display: block; }

        /* Form Styling */
        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
        }

        .option-input { display: flex; align-items: center; gap: 10px; }
        .correct-check { width: 30px; cursor: pointer; }

        .btn-main {
            width: 100%;
            padding: 15px;
            background: var(--success);
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
        }

        .admin-nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; font-size: 0.8rem; }
        .admin-nav span { cursor: pointer; opacity: 0.7; }
        .admin-nav span.active-sub { opacity: 1; border-bottom: 2px solid white; }

        .quiz-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <nav class="tabs">
        <button class="tab-btn active" onclick="showTab('student')">Student Portal</button>
        <button class="tab-btn" onclick="showTab('admin')">Admin Panel</button>
    </nav>

    <div id="student" class="content-section active">
        <div id="student-auth">
            <h2 style="text-align: center;">Welcome</h2>
            <input type="text" id="studentName" placeholder="Enter your full name">
            <button class="btn-main" onclick="startQuiz()">Start Quiz</button>
        </div>

        <div id="quiz-area" class="hidden">
            <h3 id="display-student-name"></h3>
            <hr>
            <div id="questions-container"></div>
            <button class="btn-main" onclick="submitQuiz()">Submit Results</button>
        </div>
    </div>

    <div id="admin" class="content-section">
        <div id="admin-login">
            <h3>Admin Login</h3>
            <input type="password" id="adminPass" placeholder="Enter Passcode">
            <button class="btn-main" onclick="adminLogin()">Login</button>
        </div>

        <div id="admin-panel" class="hidden">
            <div class="admin-nav">
                <span id="nav-manage" class="active-sub" onclick="showAdminSub('manage')">Manage Quiz</span>
                <span id="nav-dashboard" onclick="showAdminSub('dashboard')">Student Dashboard</span>
            </div>

            <div id="sub-manage">
                <h2>Manage Quiz Questions</h2>
                <input type="text" id="qText" placeholder="Enter Question text...">
                <select id="qType" onchange="toggleInputs()">
                    <option value="mcq">Multiple choices</option>
                    <option value="tf">True or False</option>
                </select>

                <div id="mcq-options">
                    <div class="option-input"><input type="text" class="opt" placeholder="Option A"><input type="radio" name="correct" value="0" checked></div>
                    <div class="option-input"><input type="text" class="opt" placeholder="Option B"><input type="radio" name="correct" value="1"></div>
                    <div class="option-input"><input type="text" class="opt" placeholder="Option C"><input type="radio" name="correct" value="2"></div>
                    <div class="option-input"><input type="text" class="opt" placeholder="Option D"><input type="radio" name="correct" value="3"></div>
                </div>

                <div id="tf-options" class="hidden">
                    <div class="option-input"><span>True</span> <input type="radio" name="correct-tf" value="True" checked></div>
                    <div class="option-input"><span>False</span> <input type="radio" name="correct-tf" value="False"></div>
                </div>

                <button class="btn-main" onclick="saveQuestion()">Add Question</button>
                <hr>
                <div id="admin-questions-list"></div>
            </div>

            <div id="sub-dashboard" class="hidden">
                <h2>Student Records</h2>
                <div id="records-list"></div>
            </div>
        </div>
    </div>
</div>

<script src="style.js"></script>
</body>
</html>
